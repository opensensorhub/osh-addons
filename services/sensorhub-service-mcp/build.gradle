description = 'Model Context Protocol Service'
ext.details = 'MCP server exposing OSH APIs'

dependencies {
    implementation 'org.sensorhub:sensorhub-core:' + oshCoreVersion
    implementation 'io.modelcontextprotocol.sdk:mcp:0.15.0'
}

// add info to OSGI manifest
osgi {
  manifest {
    attributes 'Bundle-Vendor': 'Botts Innovative Research, Inc.'
    attributes 'Bundle-Activator': 'com.botts.impl.service.mcp.Activator'
  }
}

// add info to maven pom
ext.pom >>= {
  developers {
    developer {
      id 'earocorn'
      name 'Alex Almanza'
      organization 'Botts Innovative Research, Inc.'
      organizationUrl 'https://www.botts-inc.com'
    }
  } 
}
