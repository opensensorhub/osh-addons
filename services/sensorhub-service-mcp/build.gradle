description = 'Model Context Protocol Service'
ext.details = 'MCP server exposing OSH APIs'

dependencies {
    implementation 'org.sensorhub:sensorhub-core:' + oshCoreVersion
    implementation 'io.modelcontextprotocol.sdk:mcp:1.1.1'
}

// add info to OSGI manifest
osgi {
  manifest {
    attributes 'Bundle-Vendor': 'GeoRobotix Innovative Research, LLC.'
    attributes 'Bundle-Activator': 'com.georobotix.impl.service.mcp.Activator'
  }
}

// add info to maven pom
ext.pom >>= {
  developers {
    developer {
      id 'earocorn'
      name 'Alex Almanza'
      organization 'GeoRobotix Innovative Research, LLC.'
      organizationUrl 'https://georobotix.us'
    }
  } 
}
