services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.6.1
    command:
      - start-dev
      - --http-host=0.0.0.0
      - --http-port=8080
      - --hostname=http://localhost:8180
      - --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    ports:
      - "127.0.0.1:8180:8080"
    volumes:
      - ./realm:/opt/keycloak/data/import:ro
      - keycloak_data:/opt/keycloak/data

volumes:
  keycloak_data:
