description = 'Unmanned System UI'
ext.details = 'MAVLink Adapter Custom UI'

version='1.0.0'

dependencies{
  implementation 'org.sensorhub:sensorhub-core:' + oshCoreVersion
  implementation 'org.sensorhub:sensorhub-webui-core:' + oshCoreVersion
  embeddedImpl 'com.vaadin:vaadin-client:8.14.3'
}

osgi {
    manifest {
        attributes('Bundle-Vendor': 'Botts Innovative Research, Inc.')
        attributes('Bundle-SymbolicName': 'org.sensorhub.impl.sensor.mavsd.ui')
        attributes('Bundle-Version': version)

        // THIS is the important part:
        attributes('Fragment-Host': 'org.sensorhub.sensorhub-webui-core')

        attributes('-dsannotations': 'false')
        attributes('Export-Package': '')
        attributes('Import-Package': '*;resolution:=optional')
    }
}

jar {
    // Take the file from a folder in your project
    from('dist') {
        include 'mavsdk_server_linux-arm64-musl'
        include 'mavsdk_server_macos_arm64'
        include 'mavsdk_server_macos_x64'
        include 'mavsdk_server_musl_x86_64'
        include 'mavsdk_server_win_arm64.exe'
        include 'mavsdk_server_win_x64.exe'
        into 'natives'

        // Critical for Linux/Mac: preserves execution permissions
        filePermissions {
            user {
                read = true
                execute = true
                write = true
            }
            other {
                read = true
                execute = true
            }
        }
    }
}
