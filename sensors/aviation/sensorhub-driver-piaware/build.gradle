description = 'Driver for PiAware ADS-B flight receiver'
ext.details = 'Driver for decoding PiAware streaming data using raspberry pi and flight aware receiver software'
version = '0.1.0'

dependencies {
  compile 'org.sensorhub:sensorhub-core:' + oshCoreVersion
  compile 'com.google.code.gson:gson:2.8.7'
}

// add info to OSGi manifest
jar {
  manifest {
    instruction 'Bundle-Vendor', ''
    instruction 'Bundle-Activator', 'org.sensorhub.impl.driver.piAware.Activator'
  }
}

// add info to maven pom
ext.pom >>= {
  developers {
    developer {
      name 'Tony Cook'
      organization 'Botts Inc'
      organizationUrl '' 
    }
  }
}
